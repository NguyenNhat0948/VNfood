<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nat's Vietnamese Recipes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Nat's Recipes</div>
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="vi">VI</button>
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="ja">JP</button>
        </div>
    </nav>

    <header class="hero">
        <img src="C:/Users/nhat0/.gemini/antigravity/brain/8e299660-1365-4c3c-b475-477360834912/chef_avatar_1777007377422.png" alt="Profile Avatar" class="avatar">
        <h1 id="title" class="animate-on-scroll">Công thức nấu ăn của Nat</h1>
        <p id="subtitle" class="animate-on-scroll">Lưu trữ và chia sẻ những món ăn ngon mỗi ngày!</p>
        
        <div class="search-container animate-on-scroll">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Tìm kiếm công thức hoặc nguyên liệu...">
        </div>
        
        <div class="categories animate-on-scroll" id="categoryContainer">
            <!-- Categories will be generated by JS -->
        </div>
    </header>

    <main class="container">
        <div class="recipe-grid" id="recipeGrid">
            <!-- Recipe cards will be generated by JS -->
        </div>
    </main>

    <footer>
        <p id="footer-text">© 2026 Nat. All rights reserved.</p>
    </footer>

    <!-- Recipe Modal -->
    <div id="recipeModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
